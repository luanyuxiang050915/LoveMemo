<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的倒计时</title>
<style>
/* ===== 全局重置与基础 ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --pink-light: #ffb3c1;
  --pink: #ff6b9d;
  --pink-deep: #e8507a;
  --purple-light: #f0d5f5;
  --purple: #c9b1d9;
  --white: #ffffff;
  --white-pink: #fff5f7;
  --text-dark: #5a3e4b;
  --text-mid: #8b6b7a;
  --shadow-soft: 0 4px 20px rgba(255, 107, 157, 0.15);
  --shadow-hover: 0 12px 40px rgba(255, 107, 157, 0.28);
  --shadow-card: 0 8px 30px rgba(200, 150, 170, 0.18);
  --radius: 24px;
  --transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-bg-hover: rgba(255, 255, 255, 0.62);
  --glass-border: rgba(255, 255, 255, 0.55);
  --glass-border-hover: rgba(255, 255, 255, 0.8);
  --glass-blur: 22px;
  --glass-blur-light: 12px;
  --glass-shimmer: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.25) 100%);
}

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Noto Sans SC", "WenQuanYi Micro Hei", sans-serif;
  background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 30%, #fbc2eb 55%, #fad0c4 75%, #ffe0ec 100%);
  background-attachment: fixed;
  color: var(--text-dark);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(255, 182, 193, 0.4) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(240, 180, 220, 0.35) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== 浮动毛玻璃球体 ===== */
.glass-orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  backdrop-filter: blur(60px);
  -webkit-backdrop-filter: blur(60px);
}
.glass-orb.orb-1 {
  width: 320px; height: 320px;
  top: -80px; left: -60px;
  background: rgba(255, 182, 193, 0.35);
  animation: orbFloat1 12s ease-in-out infinite;
}
.glass-orb.orb-2 {
  width: 240px; height: 240px;
  top: 40%; right: -50px;
  background: rgba(210, 180, 230, 0.35);
  animation: orbFloat2 15s ease-in-out infinite;
}
.glass-orb.orb-3 {
  width: 280px; height: 280px;
  bottom: -60px; left: 30%;
  background: rgba(255, 154, 158, 0.3);
  animation: orbFloat3 18s ease-in-out infinite;
}
.glass-orb.orb-4 {
  width: 200px; height: 200px;
  top: 25%; left: 55%;
  background: rgba(255, 220, 240, 0.4);
  animation: orbFloat4 14s ease-in-out infinite;
}
@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, 30px) scale(1.08); }
  66% { transform: translate(-20px, -20px) scale(0.94); }
}
@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-35px, -25px) scale(1.06); }
  66% { transform: translate(25px, 20px) scale(0.92); }
}
@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(30px, -40px) scale(1.1); }
}
@keyframes orbFloat4 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-25px, 35px) scale(1.12); }
}

/* ===== 飘落爱心容器 ===== */
.hearts-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.heart-particle {
  position: absolute;
  top: -60px;
  font-size: 20px;
  animation: heartFall linear infinite;
  opacity: 0;
}

@keyframes heartFall {
  0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
  5% { opacity: 0.7; }
  15% { opacity: 0.65; }
  30% { transform: translateY(30vh) rotate(120deg) scale(0.8); opacity: 0.55; }
  60% { transform: translateY(60vh) rotate(240deg) scale(0.9); opacity: 0.4; }
  85% { opacity: 0.15; }
  100% { transform: translateY(105vh) rotate(360deg) scale(0.5); opacity: 0; }
}

/* ===== 页面头部 ===== */
.site-header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 50px 20px 10px;
  width: 100%;
  max-width: 1200px;
}

.site-title {
  font-family: "Georgia", "Palatino Linotype", "Book Antiqua", "Palatino", "Times New Roman", serif;
  font-size: clamp(52px, 8vw, 80px);
  font-weight: 400;
  font-style: italic;
  color: var(--text-dark);
  letter-spacing: 0.08em;
  animation: titleGlow 4s ease-in-out infinite;
  background: linear-gradient(135deg, #d4788f 0%, #b8899a 30%, #c97a8f 50%, #b07080 70%, #d4788f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(180, 100, 120, 0.3));
  display: inline-block;
  position: relative;
  padding: 14px 36px;
}
.site-title::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: 60px;
  z-index: -1;
  box-shadow: var(--shadow-soft), 0 8px 32px rgba(255,182,193,0.15);
}
.site-title::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transform: skewX(-20deg);
  animation: glassShine 5s ease-in-out infinite;
  z-index: -1;
}
.site-title .amp {
  font-family: "Baskerville", "Georgia", serif;
  font-style: normal;
  font-weight: 700;
  color: #d4788f;
  -webkit-text-fill-color: #d4788f;
  display: inline-block;
  margin: 0 2px;
  animation: ampPulse 2.5s ease-in-out infinite;
}
@keyframes ampPulse {
  0%, 100% { transform: scale(1); opacity: 0.85; }
  50% { transform: scale(1.12); opacity: 1; }
}

.site-subtitle {
  margin-top: 18px;
  font-size: 14px;
  color: var(--text-mid);
  font-weight: 400;
  letter-spacing: 3px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: 30px;
  padding: 8px 28px;
  display: inline-block;
}

@keyframes glassShine {
  0%, 100% { left: -100%; }
  50% { left: 140%; }
}
@keyframes titleGlow {
  0%, 100% { text-shadow: 0 2px 10px rgba(255, 107, 157, 0.2); filter: brightness(1); }
  50% { text-shadow: 0 2px 20px rgba(255, 107, 157, 0.45), 0 0 40px rgba(255, 154, 158, 0.25); filter: brightness(1.05); }
}

/* ===== Tab 导航 ===== */
.tab-nav {
  position: relative;
  z-index: 2;
  display: flex;
  gap: 4px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: 40px;
  padding: 5px;
  margin-top: 16px;
  box-shadow: var(--shadow-soft);
}
.tab-btn {
  padding: 12px 28px;
  border-radius: 36px;
  border: none;
  background: transparent;
  color: var(--text-mid);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.35s ease;
  white-space: nowrap;
  font-family: inherit;
  letter-spacing: 0.5px;
}
.tab-btn.active {
  background: rgba(255,255,255,0.7);
  color: var(--pink-deep);
  box-shadow: 0 2px 12px rgba(255,107,157,0.18);
}
.tab-btn:hover:not(.active) {
  color: var(--text-dark);
  background: rgba(255,255,255,0.35);
}

/* ===== 主内容区 ===== */
.main-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1200px;
  padding: 0 24px 80px;
}

/* 内容面板 */
.content-panel { display: none; }
.content-panel.active { display: block; }

/* CSS Grid 平铺布局 */
.countdown-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 28px;
  align-items: start;
  margin-top: 28px;
}

/* ===== 倒计时卡片 ===== */
.countdown-card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-radius: var(--radius);
  padding: 32px 28px 28px;
  box-shadow: 0 4px 24px rgba(255, 107, 157, 0.08), 0 1px 0 rgba(255,255,255,0.4) inset;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), background 0.45s ease, border-color 0.45s ease;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.countdown-card::before {
  content: '';
  position: absolute;
  top: 0; left: 5%; right: 5%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  transition: opacity 0.35s;
  pointer-events: none;
  z-index: 2;
}
.countdown-card .card-decor {
  position: absolute;
  top: -8px;
  right: 20px;
  font-size: 40px;
  opacity: 0.12;
  transform: rotate(15deg);
  transition: opacity 0.35s, transform 0.35s;
  pointer-events: none;
  z-index: 0;
}
.countdown-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 16px 48px rgba(255, 107, 157, 0.22), 0 2px 0 rgba(255,255,255,0.5) inset;
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}
.countdown-card:hover::before { opacity: 0.5; }
.countdown-card:hover .card-decor {
  opacity: 0.3;
  transform: rotate(0deg) scale(1.3);
}
.countdown-card.expired {
  border-color: rgba(232, 168, 56, 0.35);
  background: rgba(255, 248, 235, 0.55);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}

.pin-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--pink-deep);
  background: rgba(255, 107, 157, 0.1);
  padding: 4px 12px;
  border-radius: 20px;
  width: fit-content;
  font-weight: 600;
}

.card-emoji {
  font-size: 42px;
  line-height: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-dark);
  letter-spacing: 0.5px;
}

.card-desc {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.6;
  min-height: 20px;
}

.card-countdown {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.countdown-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 18px;
  padding: 12px 16px;
  min-width: 62px;
  box-shadow: 0 2px 12px rgba(255, 107, 157, 0.06), 0 1px 0 rgba(255,255,255,0.3) inset;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.countdown-card:hover .countdown-unit {
  box-shadow: 0 4px 20px rgba(255, 107, 157, 0.12), 0 1px 0 rgba(255,255,255,0.4) inset;
}

.countdown-num {
  font-size: 26px;
  font-weight: 800;
  color: var(--pink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.countdown-label {
  font-size: 11px;
  color: var(--text-mid);
  margin-top: 4px;
  font-weight: 500;
}

.countdown-card.expired .countdown-num { color: #e8a838; }

.expired-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: 700;
  color: #e8a838;
  animation: celebratePulse 1.5s ease-in-out infinite;
}

@keyframes celebratePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ===== 空状态 ===== */
.empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  text-align: center;
  gap: 20px;
}
.empty-emoji {
  font-size: 80px;
  animation: emptyFloat 3s ease-in-out infinite;
}
@keyframes emptyFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
.empty-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-dark);
}
.empty-desc {
  font-size: 15px;
  color: var(--text-mid);
  max-width: 400px;
  line-height: 1.7;
}

/* ===== 纪念日 - 日历容器 ===== */
.calendar-wrapper {
  margin-top: 24px;
}

/* 月份导航 */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 24px;
}
.month-nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  color: var(--text-dark);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.month-nav-btn:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
  box-shadow: var(--shadow-soft);
}
.month-label {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-dark);
  min-width: 180px;
  text-align: center;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  padding: 10px 28px;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s ease;
}
.month-label:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
  box-shadow: var(--shadow-soft);
  transform: scale(1.03);
}

/* 年月选择器 */
.month-picker-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 260px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.month-picker-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.month-picker {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: 0 24px 80px rgba(255,107,157,0.2), 0 2px 0 rgba(255,255,255,0.5) inset;
  max-width: 360px;
  width: 90vw;
  transform: translateY(-10px);
  transition: transform 0.25s cubic-bezier(0.25,0.8,0.25,1.2);
}
.month-picker-overlay.active .month-picker {
  transform: translateY(0);
}
.mp-year-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.mp-year-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--text-dark);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.mp-year-btn:hover {
  background: var(--glass-bg-hover);
  border-color: var(--pink);
  box-shadow: var(--shadow-soft);
}
.mp-year-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-dark);
  min-width: 80px;
  text-align: center;
}
.mp-month-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.mp-month-btn {
  padding: 12px 6px;
  border-radius: 14px;
  border: 1px solid transparent;
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-dark);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: inherit;
  text-align: center;
}
.mp-month-btn:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
  transform: scale(1.05);
}
.mp-month-btn.active-month {
  background: rgba(255,107,157,0.2);
  border-color: var(--pink);
  color: var(--pink-deep);
  font-weight: 700;
}
.mp-today-btn {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-mid);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}
.mp-today-btn:hover {
  background: var(--glass-bg-hover);
  border-color: var(--pink);
  color: var(--pink-deep);
}

/* 日历网格 */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  max-width: 700px;
  margin: 0 auto 28px;
}

/* 星期头 */
.calendar-weekday {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-mid);
  padding: 10px 0;
  letter-spacing: 1px;
}

/* 日历日期格 */
.calendar-cell {
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur-light));
  -webkit-backdrop-filter: blur(var(--glass-blur-light));
  border: 1px solid transparent;
  cursor: default;
  transition: all 0.3s ease;
  position: relative;
  gap: 2px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-dark);
  user-select: none;
}
.calendar-cell.other-month {
  opacity: 0.3;
  pointer-events: none;
}
.calendar-cell.today {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,107,157,0.2), 0 4px 16px rgba(255,107,157,0.15);
  background: rgba(255,182,193,0.4);
  font-weight: 800;
}
.calendar-cell.has-memorial {
  cursor: pointer;
  border-color: rgba(255,255,255,0.5);
}
.calendar-cell.has-memorial:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 24px rgba(255,107,157,0.2);
  border-color: var(--pink);
  z-index: 1;
}
.calendar-cell.has-holiday {
  border-color: rgba(255, 193, 7, 0.4);
  background: rgba(255, 248, 225, 0.3);
}

/* 节假日标签 */
.holiday-label {
  font-size: 9px;
  font-weight: 600;
  color: #c79100;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  line-height: 1.2;
  text-align: center;
}

/* 日历图例 */
.calendar-legend {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--text-mid);
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

.calendar-cell.selected {
  border-color: var(--purple) !important;
  box-shadow: 0 0 0 3px rgba(201,177,217,0.35), 0 6px 24px rgba(201,177,217,0.25) !important;
  background: rgba(240,213,245,0.5) !important;
}

/* 纪念日小圆点 */

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'countdown_data';
  const API_URL = '/api/data';
  const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

  // 节假日数据：公历固定 + 农历节日（已转为对应年公历）
  const HOLIDAYS = {
    // 公历固定节日
    '01-01': '🎉 元旦',
    '02-14': '💕 情人节',
    '03-08': '👩 妇女节',
    '04-01': '😜 愚人节',
    '05-01': '🔨 劳动节',
    '05-04': '🔥 青年节',
    '06-01': '🧒 儿童节',
    '07-01': '🇨🇳 建党节',
    '08-01': '🎖️ 建军节',
    '09-10': '👨‍🏫 教师节',
    '10-01': '🇨🇳 国庆节',
    '10-31': '🎃 万圣节',
    '11-11': '🛒 光棍节',
    '12-24': '🎄 平安夜',
    '12-25': '🎅 圣诞节',
    '12-31': '🎆 跨年夜',
    // 农历节日（2025年公历对应）
    '2025-01-29': '🧧 春节',
    '2025-02-12': '🏮 元宵节',
    '2025-04-04': '🌿 清明节',
    '2025-05-31': '🐉 端午节',
    '2025-08-29': '🥮 七夕',
    '2025-10-06': '🌕 中秋节',
    '2025-10-29': '👴 重阳节',
    // 农历节日（2026年公历对应）
    '2026-02-17': '🧧 春节',
    '2026-03-04': '🏮 元宵节',
    '2026-04-05': '🌿 清明节',
    '2026-06-19': '🐉 端午节',
    '2026-08-19': '🥮 七夕',
    '2026-09-25': '🌕 中秋节',
    '2026-10-18': '👴 重阳节',
  };
  let calendarYear, calendarMonth, selectedMemorialDay = null;
  let currentTab = 'memorial';
  let useServer = false;

  // ==================== 数据层 ====================
  function getDefaultData() {
    return {
      countdowns: [],
      memorials: [],
      settings: {
        siteTitle: 'Q&L',
        password: 'Lyx20050915@'
      }
    };
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return getDefaultData();
      const data = JSON.parse(raw);
      return {
        countdowns: Array.isArray(data.countdowns) ? data.countdowns : [],
        memorials: Array.isArray(data.memorials) ? data.memorials : [],
        settings: typeof data.settings === 'object' && data.settings !== null
          ? { siteTitle: data.settings.siteTitle || 'Q&L', password: data.settings.password || 'Lyx20050915@', ...data.settings }
          : getDefaultData().settings
      };
    } catch (e) {
      return getDefaultData();
    }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    // 异步写服务端
    if (useServer) {
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }).catch(() => {});
    }
  }

  // 初始化时尝试连接服务器
  async function probeServer() {
    try {
      const res = await fetch(API_URL);
      if (res.ok) {
        useServer = true;
        const serverData = await res.json();
        // 服务器数据覆盖 localStorage
        if (serverData && (serverData.countdowns || serverData.memorials)) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(serverData));
        }
        console.log('✅ 数据从服务器加载');

        return;
      }
    } catch (e) {}
    console.log('💾 数据存储到浏览器本地');
  }

  // ==================== 纪念日计算 ====================
  function getMemorialInfo(memorial) {
    const now = new Date();
    const origDate = new Date(memorial.date);
    const origYear = origDate.getFullYear();
    const origMonth = origDate.getMonth(); // 0-based
    const origDay = origDate.getDate();

    // 计算已过多少年
    let yearsPassed = now.getFullYear() - origYear;
    const thisYearBirthday = new Date(now.getFullYear(), origMonth, origDay);
    if (now < thisYearBirthday) yearsPassed--;

    // 下一个纪念日
    let nextDate = new Date(now.getFullYear(), origMonth, origDay);
    if (nextDate <= now) {
      nextDate = new Date(now.getFullYear() + 1, origMonth, origDay);
    }

    const diffMs = nextDate.getTime() - now.getTime();
    const daysLeft = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    // 是否今天
    const isToday = (now.getMonth() === origMonth && now.getDate() === origDay);

    return {
      origYear,
      origMonth,
      origDay,
      yearsPassed,
      nextDate,
      daysLeft,
      isToday,
      daysSince: Math.floor((now.getTime() - origDate.getTime()) / (1000 * 60 * 60 * 24))
    };
  }

  // ==================== Tab 切换 ====================
  function switchTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
    const panelMap = { countdown: 'Countdown', memorial: 'Memorial', messages: 'Messages', album: 'Album' };
    document.getElementById('panel' + panelMap[tabName]).classList.add('active');

    if (tabName === 'memorial') {
      calendarYear = new Date().getFullYear();
      calendarMonth = new Date().getMonth() + 1;
      renderCalendar();
    }
  }

  document.getElementById('tabNav').addEventListener('click', function(e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    switchTab(btn.dataset.tab);
  });

  // ==================== 日历渲染 ====================
  function renderCalendar() {
    const data = loadData();
    const memorials = data.memorials;
    const now = new Date();
    const today = now.getDate();
    const todayMonth = now.getMonth() + 1;
    const todayYear = now.getFullYear();

    // 更新月份标签
    document.getElementById('monthLabel').textContent = `${calendarYear}年 ${calendarMonth}月`;

    // 当月第一天和最后一天
    const firstDay = new Date(calendarYear, calendarMonth - 1, 1);
    const lastDay = new Date(calendarYear, calendarMonth, 0);
    const daysInMonth = lastDay.getDate();
    const startWeekday = firstDay.getDay(); // 0=Sun

    // 构建按日期索引的纪念日 map (MM-DD)
    const memorialMap = {};
    memorials.forEach(m => {
      const d = new Date(m.date);
      const key = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      if (!memorialMap[key]) memorialMap[key] = [];
      memorialMap[key].push(m);
    });

    // 构建节假日 map (MM-DD 固定 + YYYY-MM-DD 农历)
    const holidayMap = {};
    const fullKey = `${calendarYear}-${String(calendarMonth).padStart(2, '0')}`;
    for (const [k, v] of Object.entries(HOLIDAYS)) {
      if (k.length === 5) {
        // 公历固定: MM-DD
        holidayMap[k] = v;
      } else if (k.startsWith(fullKey)) {
        // 农历: YYYY-MM-DD → 取 MM-DD
        const mmdd = k.slice(5);
        holidayMap[mmdd] = v;
      }
    }

    // 星期头
    let html = WEEKDAYS.map(w => `<div class="calendar-weekday">${w}</div>`).join('');

    // 填充空白
    for (let i = 0; i < startWeekday; i++) {
      html += '<div class="calendar-cell other-month"></div>';
    }

    // 日期格
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${String(calendarMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const hasMemorial = memorialMap[key] && memorialMap[key].length > 0;
      const holidayName = holidayMap[key] || '';
      const hasHoliday = !!holidayName;
      const isToday = (d === today && calendarMonth === todayMonth && calendarYear === todayYear);
      const isSelected = selectedMemorialDay === key;

      let classes = 'calendar-cell';
      if (hasMemorial) classes += ' has-memorial';
      if (hasHoliday && !hasMemorial) classes += ' has-holiday';
      if (isToday) classes += ' today';
      if (isSelected) classes += ' selected';

      let dotsHTML = '';
      if (hasMemorial) {
        dotsHTML = '<div class="memorial-dots">' +
          memorialMap[key].map(m => `<span class="memorial-dot" style="background:${m.color || '#ff6b9d'};" title="${escHtml(m.title)}"></span>`).join('') +
          '</div>';
      }

      let holidayHTML = '';
      if (holidayName) {
        holidayHTML = `<span class="holiday-label" title="${escHtml(holidayName)}">${holidayName}</span>`;
      }

      const tooltip = hasMemorial ? 'title="点击查看纪念日详情"' : '';

      html += `<div class="${classes}" data-date="${key}" ${tooltip}>
        ${isToday ? '<span class="today-label">今天</span>' : ''}
        <span>${d}</span>
        ${dotsHTML}
        ${holidayHTML}
      </div>`;
    }

    document.getElementById('calendarGrid').innerHTML = html;

    // 绑定日历格点击
    document.querySelectorAll('.calendar-cell.has-memorial').forEach(cell => {
      cell.addEventListener('click', function() {
        const key = this.dataset.date;
        selectedMemorialDay = key;
        renderCalendar();
        showMemorialDetail(key, memorialMap[key]);
      });
    });

    // 渲染近期纪念日列表
    renderMemorialList(data);

    // 如果有选中的日期，显示详情
    if (selectedMemorialDay && memorialMap[selectedMemorialDay]) {
      showMemorialDetail(selectedMemorialDay, memorialMap[selectedMemorialDay]);
    } else {
      document.getElementById('memorialDetail').classList.remove('active');
    }
  }

  function showMemorialDetail(key, memorials) {
    const detail = document.getElementById('memorialDetail');
    if (!memorials || memorials.length === 0) {
      detail.classList.remove('active');
      return;
    }

    // 显示第一个纪念日的详情（可扩展为多个）
    const m = memorials[0];
    const info = getMemorialInfo(m);

    const [mm, dd] = key.split('-');
    const dateStr = `${parseInt(mm)}月${parseInt(dd)}日`;

    detail.innerHTML = `
      <div class="memorial-detail-emoji">${m.emoji || '💝'}</div>
      <div class="memorial-detail-title">${escHtml(m.title)}</div>
      ${m.description ? `<div class="memorial-detail-desc">${escHtml(m.description)}</div>` : ''}
      <div class="memorial-detail-info">
        <div class="memorial-detail-stat">
          <div class="stat-num">${info.yearsPassed}</div>
          <div class="stat-label">周年</div>
        </div>
        <div class="memorial-detail-stat">
          <div class="stat-num">${info.daysSince}</div>
          <div class="stat-label">总天数</div>
        </div>
        <div class="memorial-detail-stat">
          <div class="stat-num">${info.isToday ? '🎉' : info.daysLeft}</div>
          <div class="stat-label">${info.isToday ? '就是今天！' : '距下次'}</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--text-mid);">
        📅 每年 ${dateStr} | 始于 ${info.origYear}年
      </div>
    `;
    detail.classList.add('active');
  }

  function renderMemorialList(data) {
    const memorials = data.memorials;
    const listEl = document.getElementById('memorialList');

    if (memorials.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-emoji">💌</div>
          <p class="empty-title">还没有纪念日哦~</p>
          <p class="empty-desc">通过管理后台添加属于你们的纪念日吧 ✨</p>
        </div>`;
      return;
    }

    // 只显示未来一年内的纪念日（含今天）
    const sorted = memorials.map(m => ({ m, info: getMemorialInfo(m) }))
      .filter(({ info }) => info.isToday || info.daysLeft <= 365)
      .sort((a, b) => {
        if (a.info.isToday && !b.info.isToday) return -1;
        if (!a.info.isToday && b.info.isToday) return 1;
        return a.info.daysLeft - b.info.daysLeft;
      });

    if (sorted.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-emoji">📅</div>
          <p class="empty-title">未来一年暂无纪念日</p>
          <p class="empty-desc">去后台添加属于你们的纪念日吧~</p>
        </div>`;
      return;
    }

    listEl.innerHTML = sorted.map(({ m, info }) => {
      const isToday = info.isToday;
      let daysHTML;
      if (isToday) {
        daysHTML = `<span class="days-left" style="color:var(--pink-deep);">🎉</span><div class="days-label">就是今天！</div>`;
      } else if (info.daysLeft <= 30) {
        daysHTML = `<span class="days-left">${info.daysLeft}</span><div class="days-label">天后</div>`;
      } else {
        daysHTML = `<span class="days-left" style="font-size:16px;color:var(--text-mid);">${info.daysLeft}</span><div class="days-label">天后</div>`;
      }

      const [mm, dd] = [String(info.origMonth + 1).padStart(2, '0'), String(info.origDay).padStart(2, '0')];

      return `
        <div class="memorial-card${isToday ? ' is-today' : ''}" data-key="${mm}-${dd}" style="cursor:pointer;">
          <div class="memorial-card-emoji">${m.emoji || '💝'}</div>
          <div class="memorial-card-info">
            <div class="memorial-card-title">${escHtml(m.title)}</div>
            <div class="memorial-card-date">📅 每年${info.origMonth + 1}月${info.origDay}日 · 始于${info.origYear}年</div>
            <div class="memorial-card-years">已 ${info.yearsPassed} 周年 · ${info.daysSince} 天</div>
          </div>
          <div class="memorial-card-countdown">${daysHTML}</div>
        </div>`;
    }).join('');

    // 点击跳转到该日期
    listEl.querySelectorAll('.memorial-card').forEach(card => {
      card.addEventListener('click', function() {
        const key = this.dataset.key;
        const [mm, dd] = key.split('-').map(Number);
        calendarYear = new Date().getFullYear();
        calendarMonth = mm;
        selectedMemorialDay = key;
        renderCalendar();
        // 滚动到顶部
        document.getElementById('calendarGrid').scrollIntoView({ behavior: 'smooth' });
      });
    });
  }

  // 月份导航
  document.getElementById('monthPrev').addEventListener('click', function() {
    selectedMemorialDay = null;
    if (calendarMonth === 1) { calendarMonth = 12; calendarYear--; }
    else calendarMonth--;
    renderCalendar();
  });
  document.getElementById('monthNext').addEventListener('click', function() {
    selectedMemorialDay = null;
    if (calendarMonth === 12) { calendarMonth = 1; calendarYear++; }
    else calendarMonth++;
    renderCalendar();
  });

  // 月份标签点击 → 弹出年月选择器
  document.getElementById('monthLabel').addEventListener('click', function() {
    openMonthPicker();
  });

  function openMonthPicker() {
    const picker = document.getElementById('monthPicker');
    const yearNum = document.getElementById('mpYearNum');
    const monthGrid = document.getElementById('mpMonthGrid');
    picker.classList.add('active');
    yearNum.textContent = calendarYear;

    const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    monthGrid.innerHTML = MONTHS.map((m, i) => {
      const cls = (i + 1 === calendarMonth) ? ' mp-month-btn active-month' : 'mp-month-btn';
      return `<button class="${cls}" data-month="${i + 1}">${m}</button>`;
    }).join('');

    // 绑定月份点击
    monthGrid.querySelectorAll('.mp-month-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        calendarMonth = parseInt(this.dataset.month);
        selectedMemorialDay = null;
        renderCalendar();
        closeMonthPicker();
      });
    });
  }

  function closeMonthPicker() {
    document.getElementById('monthPicker').classList.remove('active');
  }

  // 选择器内年份切换
  document.getElementById('mpYearPrev').addEventListener('click', function() {
    calendarYear--;
    openMonthPicker();
  });
  document.getElementById('mpYearNext').addEventListener('click', function() {
    calendarYear++;
    openMonthPicker();
  });

  // 回到今天
  document.getElementById('mpToday').addEventListener('click', function() {
    const now = new Date();
    calendarYear = now.getFullYear();
    calendarMonth = now.getMonth() + 1;
    selectedMemorialDay = null;
    renderCalendar();
    closeMonthPicker();
  });

  // 点击选择器外部关闭
  document.getElementById('monthPicker').addEventListener('click', function(e) {
    if (e.target === this) closeMonthPicker();
  });

  // ==================== 倒计时工具函数 ====================
  function calcTimeRemaining(targetDateStr) {
    const now = Date.now();
    const target = new Date(targetDateStr).getTime();
    const diff = target - now;
    if (diff <= 0) return { expired: true, days: 0, hours: 0, minutes: 0, seconds: 0, totalMs: 0 };
    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return { expired: false, days, hours, minutes, seconds, totalMs: diff };
  }

  function formatTargetDate(targetDateStr) {
    try {
      const d = new Date(targetDateStr);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}年${m}月${day}日 ${hh}:${mm}`;
    } catch (e) { return targetDateStr; }
  }

  function sortCountdowns(countdowns) {
    return [...countdowns].sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return new Date(a.targetDate).getTime() - new Date(b.targetDate).getTime();
    });
  }

  // ==================== 倒计时渲染 ====================
  function renderCountdownUnit(num, label) {
    return `<div class="countdown-unit"><span class="countdown-num">${String(num).padStart(2, '0')}</span><span class="countdown-label">${label}</span></div>`;
  }

  function renderCard(countdown) {
    const remaining = calcTimeRemaining(countdown.targetDate);
    const emoji = countdown.emoji || '⏳';
    const desc = countdown.description || '';
    const expiredClass = remaining.expired ? ' expired' : '';
    const pinBadge = countdown.pinned ? '<span class="pin-badge">📌 置顶</span>' : '';
    let countdownHTML = '';
    if (remaining.expired) {
      countdownHTML = '<span class="expired-badge">🎉 已到达！🎉</span>';
    } else {
      countdownHTML = `<div class="card-countdown">
        ${remaining.days > 0 ? renderCountdownUnit(remaining.days, '天') : ''}
        ${renderCountdownUnit(remaining.hours, '时')}
        ${renderCountdownUnit(remaining.minutes, '分')}
        ${renderCountdownUnit(remaining.seconds, '秒')}
      </div>`;
    }
    return `<div class="countdown-card${expiredClass}"
      data-id="${escapeHTML(countdown.id)}" data-title="${escapeHTML(countdown.title)}"
      data-emoji="${escapeHTML(emoji)}" data-desc="${escapeHTML(desc)}"
      data-target="${escapeHTML(countdown.targetDate)}" data-expired="${remaining.expired}"
      data-color="${escapeHTML(countdown.color || '#ff6b9d')}" title="点击查看全屏倒计时">
      <span class="card-decor">💕</span>${pinBadge}
      <div class="card-emoji">${emoji}</div>
      <h3 class="card-title">${escapeHTML(countdown.title)}</h3>
      ${desc ? `<p class="card-desc">${escapeHTML(desc)}</p>` : ''}
      ${countdownHTML}
    </div>`;
  }

  function renderEmpty() {
    return `<div class="empty-state"><div class="empty-emoji">💌</div><p class="empty-title">还没有倒计时哦~</p><p class="empty-desc">在控制台调用 <code>addSampleData()</code> 来添加示例数据，或通过管理后台添加属于你们的倒计时吧 ✨</p></div>`;
  }

  function renderGrid(data) {
    const grid = document.getElementById('countdownGrid');
    const sorted = sortCountdowns(data.countdowns);
    grid.innerHTML = sorted.length === 0 ? renderEmpty() : sorted.map(renderCard).join('');
    bindCardEvents();
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escHtml(s) { return escapeHTML(s); }

  function bindCardEvents() {
    document.querySelectorAll('.countdown-card').forEach(card => {
      card.addEventListener('click', function () { openOverlay(this); });
    });
  }

  // ==================== 全屏 Overlay ====================
  function openOverlay(cardEl) {
    const id = cardEl.dataset.id;
    const title = cardEl.dataset.title;
    const emoji = cardEl.dataset.emoji;
    const desc = cardEl.dataset.desc;
    const targetDate = cardEl.dataset.target;
    const isExpired = cardEl.dataset.expired === 'true';
    const color = cardEl.dataset.color;
    const overlay = document.getElementById('overlay');
    const overlayContent = document.getElementById('overlayContent');
    overlayContent.style.setProperty('--card-color', color);
    let countdownHTML = '';
    if (isExpired) {
      countdownHTML = '<span class="overlay-expired-badge">🎉 已到达！🎉</span>';
    } else {
      countdownHTML = '<div class="overlay-countdown" id="overlayCountdown"></div>';
    }
    const targetFormatted = formatTargetDate(targetDate);
    overlayContent.innerHTML = `
      <button class="overlay-close-btn" id="overlayCloseBtn">✕</button>
      <div class="overlay-emoji">${emoji}</div>
      <h2 class="overlay-title">${escapeHTML(title)}</h2>
      ${desc ? `<p class="overlay-desc">${escapeHTML(desc)}</p>` : ''}
      ${countdownHTML}
      <p class="overlay-target">🎯 ${targetFormatted}</p>
      <p class="overlay-close-hint">按 ESC 或点击背景关闭</p>
    `;
    overlay.dataset.targetDate = targetDate;
    overlay.dataset.expired = isExpired;
    document.getElementById('overlayCloseBtn').addEventListener('click', closeOverlay);
    updateOverlayCountdown(targetDate, isExpired);
    requestAnimationFrame(function () { overlay.classList.add('active'); });
  }

  function closeOverlay() {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('active');
    delete overlay.dataset.targetDate;
    delete overlay.dataset.expired;
  }

  function updateOverlayCountdown(targetDateStr, isExpired) {
    const overlay = document.getElementById('overlay');
    if (!overlay.classList.contains('active')) return;
    if (isExpired) return;
    const remaining = calcTimeRemaining(targetDateStr);
    const container = document.getElementById('overlayCountdown');
    if (!container) return;
    if (remaining.expired) {
      const content = document.getElementById('overlayContent');
      const countdownEl = content.querySelector('.overlay-countdown');
      if (countdownEl) countdownEl.outerHTML = '<span class="overlay-expired-badge">🎉 已到达！🎉</span>';
      overlay.dataset.expired = 'true';
      return;
    }
    function overlayUnit(num, label) {
      return `<div class="overlay-unit"><span class="overlay-num">${String(num).padStart(2, '0')}</span><span class="overlay-label">${label}</span></div>`;
    }
    container.innerHTML =
      (remaining.days > 0 ? overlayUnit(remaining.days, '天') : '') +
      overlayUnit(remaining.hours, '时') +
      overlayUnit(remaining.minutes, '分') +
      overlayUnit(remaining.seconds, '秒');
  }

  document.getElementById('overlayBg').addEventListener('click', closeOverlay);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeOverlay();
  });

  // ==================== 倒计时实时刷新 ====================
  function refreshCountdowns() {
    const data = loadData();
    const sorted = sortCountdowns(data.countdowns);
    if (sorted.length === 0) {
      document.getElementById('countdownGrid').innerHTML = renderEmpty();
      return;
    }
    const cards = document.querySelectorAll('.countdown-card');
    cards.forEach(card => {
      const id = card.dataset.id;
      const countdown = sorted.find(c => c.id === id);
      if (!countdown) return;
      const remaining = calcTimeRemaining(countdown.targetDate);
      if (remaining.expired) {
        card.classList.add('expired');
        const countdownEl = card.querySelector('.card-countdown');
        if (countdownEl) countdownEl.outerHTML = '<span class="expired-badge">🎉 已到达！🎉</span>';
      } else {
        card.classList.remove('expired');
        const units = card.querySelectorAll('.countdown-num');
        const labels = card.querySelectorAll('.countdown-label');
        const values = [];
        if (remaining.days > 0) values.push({ num: remaining.days, label: '天' });
        values.push({ num: remaining.hours, label: '时' });
        values.push({ num: remaining.minutes, label: '分' });
        values.push({ num: remaining.seconds, label: '秒' });
        if (units.length !== values.length || card.querySelector('.expired-badge')) {
          const cardHTML = renderCard(countdown);
          card.outerHTML = cardHTML;
          const newCard = document.querySelector(`.countdown-card[data-id="${escapeHTMLAttr(countdown.id)}"]`);
          if (newCard) newCard.addEventListener('click', function () { openOverlay(this); });
        } else {
          units.forEach((unit, i) => { unit.textContent = String(values[i].num).padStart(2, '0'); });
          labels.forEach((label, i) => { label.textContent = values[i].label; });
        }
      }
    });
    const overlay = document.getElementById('overlay');
    if (overlay.classList.contains('active') && overlay.dataset.targetDate) {
      updateOverlayCountdown(overlay.dataset.targetDate, overlay.dataset.expired === 'true');
    }
  }

  function escapeHTMLAttr(str) {
    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ==================== 飘落爱心 ====================
  function createHearts() {
    const container = document.getElementById('heartsContainer');
    const hearts = ['💕', '💖', '💗', '💝', '💘', '❤️', '🩷', '💓', '🫶', '✨', '🌟'];
    function spawnHeart() {
      const heart = document.createElement('span');
      heart.className = 'heart-particle';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (14 + Math.random() * 24) + 'px';
      heart.style.animationDuration = (8 + Math.random() * 14) + 's';
      heart.style.animationDelay = '0s';
      container.appendChild(heart);
      const duration = parseFloat(heart.style.animationDuration) * 1000;
      setTimeout(() => { if (heart.parentNode) heart.parentNode.removeChild(heart); }, duration + 200);
    }
    for (let i = 0; i < 15; i++) { setTimeout(() => spawnHeart(), i * 400); }
    setInterval(() => { if (container.children.length < 25) spawnHeart(); }, 1200);
  }

  // ==================== 监听跨标签页变化 ====================
  window.addEventListener('storage', function(e) {
    if (e.key === STORAGE_KEY) {
      const data = loadData();
      document.title = data.settings.siteTitle || '我们的倒计时';
      document.getElementById('siteTitle').innerHTML = 'Q<span class="amp">&amp;</span>L';
      renderGrid(data);
      if (document.getElementById('panelMemorial').classList.contains('active')) {
        calendarYear = new Date().getFullYear();
        calendarMonth = new Date().getMonth() + 1;
        selectedMemorialDay = null;
        renderCalendar();
      }
    }
  });

  // ==================== 恋爱天数 ====================
  function updateLoveCounter() {
    const data = loadData();
    const startDate = data.settings.love_start_date || '2024-03-15';
    const start = new Date(startDate);
    const now = new Date();
    const days = Math.floor((now.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
    document.getElementById('loveDays').textContent = days;
  }

  // ==================== 留言板 ====================
  async function loadMessages() {
    if (!useServer) {
      document.getElementById('msgList').innerHTML = '<div class="empty-state"><div class="empty-emoji">🔌</div><p class="empty-title">需要连接服务器</p><p class="empty-desc">留言板需要后端支持</p></div>';
      return;
    }
    try {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (e) {
      document.getElementById('msgList').innerHTML = '<div class="empty-state"><div class="empty-emoji">❌</div><p class="empty-title">加载失败</p></div>';
    }
  }

  function renderMessages(msgs) {
    const list = document.getElementById('msgList');
    if (msgs.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-emoji">💬</div><p class="empty-title">还没有留言</p><p class="empty-desc">说点什么吧~</p></div>';
      return;
    }
    list.innerHTML = msgs.map(m => {
      const isLuan = m.author === '栾钰翔';
      const cls = isLuan ? 'luan' : 'qiu';
      const tag = isLuan ? '🧑 栾钰翔' : '👩 邱苓珂';
      const time = new Date(m.createdAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="msg-bubble ${cls}">
        <div class="msg-author-tag">${tag}</div>
        <div>${escHtml(m.content)}</div>
        <div class="msg-time">${time} <button class="msg-delete" data-id="${m.id}" title="删除">✕</button></div>
      </div>`;
    }).join('');

    // 绑定删除按钮
    list.querySelectorAll('.msg-delete').forEach(btn => {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (confirm('确定删除这条留言？')) {
          await fetch('/api/messages/' + this.dataset.id, { method: 'DELETE' });
          loadMessages();
        }
      });
    });

    // 滚动到底部
    list.scrollTop = list.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content) return;
    const author = document.getElementById('msgAuthor').value;
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ author, content })
    });
    input.value = '';
    loadMessages();
  }

  document.getElementById('msgSendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  // ==================== 相册 ====================
  let albumCategories = ['默认'];

  async function loadAlbum(category) {
    if (!useServer) {
      document.getElementById('albumGrid').innerHTML = '<div class="empty-state"><div class="empty-emoji">🔌</div><p class="empty-title">需要连接服务器</p><p class="empty-desc">相册需要后端支持</p></div>';
      return;
    }
    try {
      let url = '/api/photos';
      if (category && category !== '全部') url += '?category=' + encodeURIComponent(category);
      const res = await fetch(url);
      const photos = await res.json();
      renderAlbum(photos);
    } catch (e) {
      document.getElementById('albumGrid').innerHTML = '<div class="empty-state"><div class="empty-emoji">❌</div><p class="empty-title">加载失败</p></div>';
    }
  }

  function renderAlbum(photos) {
    const grid = document.getElementById('albumGrid');
    if (photos.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-emoji">📸</div><p class="empty-title">还没有照片</p><p class="empty-desc">上传你们的甜蜜瞬间吧~</p></div>';
      return;
    }
    grid.innerHTML = photos.map(p => `
      <div class="album-card" data-url="${p.url}">
        <button class="album-card-delete" data-id="${p.id}" title="删除">✕</button>
        <img src="${p.url}" alt="${escHtml(p.caption)}" loading="lazy">
        <div class="album-card-info">
          ${p.caption ? `<div class="album-card-caption">${escHtml(p.caption)}</div>` : ''}
          <span class="album-card-cat">${escHtml(p.category)}</span>
        </div>
      </div>
    `).join('');

    // 点击查看大图
    grid.querySelectorAll('.album-card img').forEach(img => {
      img.addEventListener('click', function(e) {
        e.stopPropagation();
        const lb = document.createElement('div');
        lb.className = 'album-lightbox';
        lb.innerHTML = `<img src="${this.parentElement.dataset.url}">`;
        lb.addEventListener('click', () => lb.remove());
        document.body.appendChild(lb);
      });
    });

    // 删除按钮
    grid.querySelectorAll('.album-card-delete').forEach(btn => {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (confirm('确定删除这张照片？')) {
          await fetch('/api/photos/' + this.dataset.id, { method: 'DELETE' });
          loadAlbum(document.getElementById('albumCatFilter').value);
          loadAlbumCategories();
        }
      });
    });
  }

  async function loadAlbumCategories() {
    if (!useServer) return;
    try {
      const res = await fetch('/api/photos/categories');
      albumCategories = await res.json();
      updateCategorySelects();
    } catch (e) {}
  }

  function updateCategorySelects() {
    const filter = document.getElementById('albumCatFilter');
    const upload = document.getElementById('uploadCategory');
    const opts = albumCategories.map(c => `<option value="${c}">${c}</option>`).join('');
    filter.innerHTML = '<option value="全部">📂 全部分类</option>' + opts;
    upload.innerHTML = opts;
  }

  document.getElementById('albumCatFilter').addEventListener('change', function() {
    loadAlbum(this.value);
  });

  // 上传弹窗
  document.getElementById('albumUploadBtn').addEventListener('click', function() {
    updateCategorySelects();
    document.getElementById('uploadOverlay').style.display = 'flex';
  });
  document.getElementById('uploadCloseBtn').addEventListener('click', function() {
    document.getElementById('uploadOverlay').style.display = 'none';
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('uploadFile').value = '';
  });
  document.getElementById('uploadOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
      this.style.display = 'none';
      document.getElementById('uploadPreview').style.display = 'none';
    }
  });

  // 预览
  document.getElementById('uploadFile').addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('uploadPreviewImg').src = e.target.result;
        document.getElementById('uploadPreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // 新建分类
  document.getElementById('addCategoryBtn').addEventListener('click', function() {
    const input = document.getElementById('newCategoryInput');
    const name = input.value.trim();
    if (!name) return;
    if (!albumCategories.includes(name)) {
      albumCategories.push(name);
      updateCategorySelects();
      document.getElementById('uploadCategory').value = name;
    }
    input.value = '';
  });

  // 上传
  document.getElementById('uploadConfirmBtn').addEventListener('click', async function() {
    const file = document.getElementById('uploadFile').files[0];
    if (!file) { alert('请选择照片'); return; }
    if (file.size > 10 * 1024 * 1024) { alert('照片不能超过10MB'); return; }

    const formData = new FormData();
    formData.append('file', file);
    formData.append('category', document.getElementById('uploadCategory').value);
    formData.append('caption', document.getElementById('uploadCaption').value);

    try {
      const res = await fetch('/api/photos', { method: 'POST', body: formData });
      const result = await res.json();
      if (result.ok) {
        document.getElementById('uploadOverlay').style.display = 'none';
        document.getElementById('uploadPreview').style.display = 'none';
        document.getElementById('uploadFile').value = '';
        document.getElementById('uploadCaption').value = '';
        loadAlbumCategories();
        loadAlbum(document.getElementById('albumCatFilter').value);
      } else {
        alert('上传失败: ' + (result.error || '未知错误'));
      }
    } catch (e) {
      alert('上传失败，请检查服务器连接');
    }
  });

  // ==================== 初始化 ====================
  async function init() {
    await probeServer();
    const data = loadData();
    document.title = (data.settings.siteTitle || 'Q&L').replace(/&amp;/g, '&').replace(/<[^>]*>/g, '');

    renderGrid(data);
    createHearts();
    updateLoveCounter();
    setInterval(() => { refreshCountdowns(); updateLoveCounter(); }, 1000);
    calendarYear = new Date().getFullYear();
    calendarMonth = new Date().getMonth() + 1;
    renderCalendar();
    // 预加载留言和相册分类
    loadMessages();
    loadAlbumCategories();
  }

      { id: 'demo_m4', title: '第一次牵手', date: '2023-12-01', description: '心跳加速的那一天', emoji: '💕', color: '#ffb3c1', pinned: false, createdAt: Date.now() - 8000 }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    init();
    console.log('✅ 示例数据已加载（含倒计时 + 纪念日）！');
  };

  init();
  console.log('💕 倒计时 + 纪念日 已就绪！');
  console.log('💡 提示：调用 addSampleData() 加载示例数据');
  console.log('📦 数据存储在 localStorage 的 countdown_data 中');
})();
